[workspace]
name = "rover"
channels = ["https://prefix.dev/robostack-jazzy", "https://prefix.dev/conda-forge"]
platforms = ["linux-64"]

# =============================================================================
# Dependencies
# =============================================================================

[dependencies]
# Build essentials
python = "*"
compilers = "*"
cmake = "*"
pkg-config = "*"
make = "*"
ninja = "*"
rosdep = "*"
colcon-common-extensions = "*"
colcon-notification = "*"
vcstool = "*"

# Dev tools
gdb = "*"
pre-commit = "*"
clang-tools = "==22.1.0"  # provides clangd, match mirrors-clang-format
ruff = "*"
pip = ">=26.0.1,<27"

# Linux
libgl-devel = "*"
sysroot_linux-64 = ">=2.39"

# ROS 2 jazzy metapackages
ros-jazzy-desktop = "*"
ros-jazzy-simulation = "*"
ros-jazzy-rmw-cyclonedds-cpp = "*"
ros-jazzy-ros-testing = "*"
ros-jazzy-osrf-testing-tools-cpp = "*"
ros-jazzy-python-cmake-module = "*"

# --- BEGIN AUTO-GENERATED DEPS (do not edit manually) ---
# Populated by `yard sync-deps` from package.xml files under src/.
# --- END AUTO-GENERATED DEPS ---

# =============================================================================
# Activation
# =============================================================================

[activation]
env = { RMW_IMPLEMENTATION = "rmw_cyclonedds_cpp" }

[target.unix.activation]
scripts = ["scripts/pixi_activate.bash", "install/setup.bash"]

# =============================================================================
# Tasks
# =============================================================================

[tasks]
build = "colcon build"
test = "colcon test"
clean = "rm -rf build install log"
import = "mkdir -p src/deps && vcs import src/deps < src/dependencies.repos"
